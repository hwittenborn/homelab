---
- name: Uninstall existing k3s
  shell: /usr/local/bin/k3s-uninstall.sh
  args:
    removes: /usr/local/bin/k3s

- name: Run k3s installation script
  shell: curl -sfL https://get.k3s.io | sh -s - server --tls-san {{ inventory_hostname | regex_replace('^.*@', '') }} --disable=traefik

- name: Wait for kubeconfig to be generated
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml

- name: Read kubeconfig from server
  slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Merge k3s config into main kubeconfig
  delegate_to: localhost
  become: false
  shell: |
    # Create a temp file for the k3s config
    TEMP_KUBECONFIG=$(mktemp)
    echo "{{ kubeconfig_raw['content'] | b64decode }}" > "$TEMP_KUBECONFIG"

    # Update the server IP
    sed -i "s/127.0.0.1/{{ inventory_hostname | regex_replace('^.*@', '') }}/g" "$TEMP_KUBECONFIG"

    # Rename entries to 'homelab'
    kubectl config --kubeconfig="$TEMP_KUBECONFIG" rename-context default homelab || true
    sed -i 's/cluster: default/cluster: homelab/g' "$TEMP_KUBECONFIG"
    sed -i 's/user: default/user: homelab/g' "$TEMP_KUBECONFIG"
    sed -i 's/name: default/name: homelab/g' "$TEMP_KUBECONFIG"

    # Merge into main config
    mkdir -p ~/.kube
    touch ~/.kube/config

    # Purge any previous homelab entries before merging. A fresh k3s install
    # rotates the cluster CA, so keeping any stale homelab stanza breaks TLS.
    CURRENT_CONTEXT=$(kubectl config --kubeconfig="$HOME/.kube/config" current-context 2>/dev/null || true)
    if [ "$CURRENT_CONTEXT" = "homelab" ]; then
      kubectl config --kubeconfig="$HOME/.kube/config" unset current-context
    fi
    kubectl config --kubeconfig="$HOME/.kube/config" delete-context homelab 2>/dev/null || true
    kubectl config --kubeconfig="$HOME/.kube/config" delete-cluster homelab 2>/dev/null || true
    kubectl config --kubeconfig="$HOME/.kube/config" unset users.homelab 2>/dev/null || true

    KUBECONFIG=~/.kube/config:"$TEMP_KUBECONFIG" kubectl config view --flatten > ~/.kube/config.new
    mv ~/.kube/config.new ~/.kube/config
    chmod 600 ~/.kube/config

    # Clean up
    rm "$TEMP_KUBECONFIG"
