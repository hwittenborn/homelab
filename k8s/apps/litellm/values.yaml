  masterKeySecretId: "7cdf6cd2-6494-44b0-baa0-b3fe0103559e"
  storeModelInDb: "True"
  docsUrl: "/docs"
  rootRedirectUrl: "/ui"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

