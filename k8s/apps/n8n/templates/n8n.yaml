apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-home
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.n8n.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres -p 5432 -U {{ .Values.postgres.user }} -d {{ .Values.postgres.db }}; do
                sleep 2
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.secretName" . }}
                  key: POSTGRES_PASSWORD
      containers:
        - name: n8n
          image: {{ .Values.n8n.image }}
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: {{ .Values.postgres.db | quote }}
            - name: DB_POSTGRESDB_USER
              value: {{ .Values.postgres.user | quote }}
            - name: DB_POSTGRESDB_SCHEMA
              value: {{ .Values.postgres.schema | quote }}
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.secretName" . }}
                  key: N8N_ENCRYPTION_KEY
            - name: N8N_HOST
              value: {{ .Values.ingress.host | quote }}
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_EDITOR_BASE_URL
              value: "https://{{ .Values.ingress.host }}"
            - name: WEBHOOK_URL
              value: "https://{{ .Values.ingress.host }}/"
            - name: N8N_PROXY_HOPS
              value: "1"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "true"
            - name: NODE_ENV
              value: production
            - name: GENERIC_TIMEZONE
              value: {{ .Values.n8n.timezone | quote }}
            - name: TZ
              value: {{ .Values.n8n.timezone | quote }}
          ports:
            - name: http
              containerPort: 5678
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.n8n.resources | nindent 12 }}
          volumeMounts:
            - name: n8n-home
              mountPath: /home/node/.n8n
      volumes:
        - name: n8n-home
          persistentVolumeClaim:
            claimName: n8n-home
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
spec:
  type: ClusterIP
  selector:
    app: n8n
  ports:
    - name: http
      port: 5678
      targetPort: http
