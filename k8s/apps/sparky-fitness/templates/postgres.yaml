apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sparkyfitness-db
spec:
  serviceName: sparkyfitness-db
  replicas: 1
  selector:
    matchLabels:
      app: sparkyfitness-db
  template:
    metadata:
      labels:
        app: sparkyfitness-db
    spec:
      containers:
        - name: postgres
          image: {{.Values.postgres.image}}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{.Values.postgres.db | quote}}
            - name: POSTGRES_USER
              value: {{.Values.postgres.user | quote}}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{include "sparky-fitness.secretName" .}}
                  key: SPARKY_FITNESS_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -d {{ .Values.postgres.db }} -U {{ .Values.postgres.user }}"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources: {{- toYaml .Values.postgres.resources | nindent 12}}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{.Values.postgres.storage}}
---
apiVersion: v1
kind: Service
metadata:
  name: sparkyfitness-db
spec:
  type: ClusterIP
  selector:
    app: sparkyfitness-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
