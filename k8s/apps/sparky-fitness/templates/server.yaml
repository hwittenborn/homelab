apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sparkyfitness-server-backup
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sparkyfitness-server-uploads
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparkyfitness-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sparkyfitness-server
  template:
    metadata:
      labels:
        app: sparkyfitness-server
    spec:
      containers:
        - name: server
          image: {{.Values.server.image}}
          ports:
            - name: http
              containerPort: 3010
          env:
            - name: SPARKY_FITNESS_DB_HOST
              value: sparkyfitness-db
            - name: SPARKY_FITNESS_DB_PORT
              value: "5432"
            - name: SPARKY_FITNESS_DB_NAME
              value: {{.Values.postgres.db | quote}}
            - name: SPARKY_FITNESS_DB_USER
              value: {{.Values.postgres.user | quote}}
            - name: SPARKY_FITNESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{include "sparky-fitness.secretName" .}}
                  key: SPARKY_FITNESS_DB_PASSWORD
            - name: SPARKY_FITNESS_APP_DB_USER
              value: {{.Values.config.appDbUser | quote}}
            - name: SPARKY_FITNESS_APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{include "sparky-fitness.secretName" .}}
                  key: SPARKY_FITNESS_APP_DB_PASSWORD
            - name: SPARKY_FITNESS_API_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{include "sparky-fitness.secretName" .}}
                  key: SPARKY_FITNESS_API_ENCRYPTION_KEY
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{include "sparky-fitness.secretName" .}}
                  key: BETTER_AUTH_SECRET
            - name: SPARKY_FITNESS_FRONTEND_URL
              value: "https://{{.Values.ingress.host}}"
            - name: SPARKY_FITNESS_LOG_LEVEL
              value: {{.Values.config.logLevel | quote}}
            - name: SPARKY_FITNESS_DISABLE_SIGNUP
              value: {{.Values.config.disableSignup | quote}}
            - name: SPARKY_FITNESS_FORCE_EMAIL_LOGIN
              value: {{.Values.config.forceEmailLogin | quote}}
            {{- if .Values.config.adminEmail}}
            - name: SPARKY_FITNESS_ADMIN_EMAIL
              value: {{.Values.config.adminEmail | quote}}
            {{- end}}
            - name: ALLOW_PRIVATE_NETWORK_CORS
              value: "false"
          volumeMounts:
            - name: backup
              mountPath: /app/SparkyFitnessServer/backup
            - name: uploads
              mountPath: /app/SparkyFitnessServer/uploads
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: sparkyfitness-server-backup
        - name: uploads
          persistentVolumeClaim:
            claimName: sparkyfitness-server-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: sparkyfitness-server
spec:
  type: ClusterIP
  selector:
    app: sparkyfitness-server
  ports:
    - name: http
      port: 3010
      targetPort: http
