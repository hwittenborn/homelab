{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.rclone.authSecretName -}}
{{- $accessKey := randAlphaNum 24 -}}
{{- $secretKey := randAlphaNum 48 -}}
{{- if $existing }}
  {{- $existingAccessKey := index $existing.data "access_key" -}}
  {{- $existingSecretKey := index $existing.data "secret_key" -}}
  {{- if and $existingAccessKey $existingSecretKey }}
    {{- $accessKey = ($existingAccessKey | b64dec) -}}
    {{- $secretKey = ($existingSecretKey | b64dec) -}}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.rclone.authSecretName }}
  labels:
    {{- include "rclone-s3.labels" . | nindent 4 }}
type: Opaque
stringData:
  access_key: {{ $accessKey | quote }}
  secret_key: {{ $secretKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.rclone.credentialsSecretName }}
  labels:
    {{- include "rclone-s3.labels" . | nindent 4 }}
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id = {{ $accessKey }}
    aws_secret_access_key = {{ $secretKey }}
