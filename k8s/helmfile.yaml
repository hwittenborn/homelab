repositories:
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: cert-manager
    url: https://charts.jetstack.io
  - name: vmware-tanzu
    url: https://vmware-tanzu.github.io/helm-charts

releases:
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager/cert-manager
    version: v1.14.5
    createNamespace: true
    set:
      - name: installCRDs
        value: true

  - name: external-secrets
    namespace: external-secrets
    chart: external-secrets/external-secrets
    version: 2.0.1
    createNamespace: true
    wait: true
    set:
      - name: bitwarden-sdk-server.enabled
        value: true
    needs:
      - cert-manager/cert-manager

  - name: eso-configuration
    namespace: external-secrets
    chart: ./external-secrets
    needs:
      - external-secrets/external-secrets

  - name: traefik-config
    namespace: kube-system
    chart: ./traefik

  - name: litellm
    namespace: litellm
    chart: ./apps/litellm
    createNamespace: true
    needs:
      - external-secrets/eso-configuration

  - name: velero-infra
    namespace: velero
    chart: ./velero
    createNamespace: true
    needs:
      - external-secrets/eso-configuration

  - name: velero
    namespace: velero
    chart: vmware-tanzu/velero
    version: 11.4.0
    needs:
      - velero/velero-infra
    values:
      - ./velero/velero-values.yaml
