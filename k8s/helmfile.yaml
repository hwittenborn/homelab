repositories:
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: cert-manager
    url: https://charts.jetstack.io
  - name: vmware-tanzu
    url: https://vmware-tanzu.github.io/helm-charts

releases:
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager/cert-manager
    version: v1.14.5
    createNamespace: true
    set:
      - name: installCRDs
        value: true

  - name: external-secrets
    namespace: external-secrets
    chart: external-secrets/external-secrets
    version: 2.0.1
    createNamespace: true
    needs:
      - cert-manager/cert-manager

  - name: eso-configuration
    namespace: external-secrets
    chart: ./external-secrets
    needs:
      - external-secrets/external-secrets
    hooks:
      - events: ["presync"]
        command: kubectl
        args:
          - wait
          - --namespace
          - external-secrets
          - --for=condition=Available
          - deployment/external-secrets-webhook
          - --timeout=180s

  - name: traefik-config
    namespace: kube-system
    chart: ./traefik

  - name: velero
    namespace: velero
    chart: vmware-tanzu/velero
    version: 12.0.0
    createNamespace: true
    wait: true
    timeout: 600
    values:
      - ./velero.values.yaml
    needs:
      - external-secrets/eso-configuration

  - name: velero-config
    namespace: velero
    chart: ./apps/velero-config
    wait: true
    timeout: 600
    needs:
      - velero/velero
    hooks:
      - events: ["presync"]
        command: kubectl
        args:
          - wait
          - --namespace
          - velero
          - --for=condition=Available
          - deployment/velero
          - --timeout=300s
      - events: ["presync"]
        command: kubectl
        args:
          - wait
          - --namespace
          - velero
          - --for=jsonpath={.status.phase}=Available
          - backupstoragelocation/default
          - --timeout=300s

  - name: litellm
    namespace: litellm
    chart: ./apps/litellm
    createNamespace: true
    needs:
      - external-secrets/eso-configuration

  - name: n8n
    namespace: n8n
    chart: ./apps/n8n
    createNamespace: true
    needs:
      - external-secrets/eso-configuration

  - name: kutt
    namespace: kutt
    chart: ./apps/kutt
    createNamespace: true
    needs:
      - external-secrets/eso-configuration
