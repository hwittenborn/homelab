apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rclone-config-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-cluster-store
    kind: ClusterSecretStore
  target:
    name: rclone-config
    creationPolicy: Owner
  data:
    - secretKey: rclone.conf
      remoteRef:
        key: {{.Values.rcloneConfig.secretId | quote}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-credentials-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-cluster-store
    kind: ClusterSecretStore
  target:
    name: velero-repo-credentials
    creationPolicy: Owner
  data:
    - secretKey: repository-password
      remoteRef:
        key: {{.Values.repoCredentials.secretId | quote}}
