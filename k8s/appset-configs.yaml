apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: configs-charts
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/hwittenborn/homelab.git
        revision: main
        files:
          - path: "k8s/configs/**/config.json"
          - path: "k8s/apps/**/chart-config.json"
  template:
    metadata:
      name: "{{ .name }}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
    spec:
      project: default
      sources:
        - repoURL: "{{ .chart }}"
          chart: "{{ .chartName }}"
          targetRevision: "{{ .version }}"
          helm:
            releaseName: "{{ .name }}"
            valueFiles:
              - $values/{{ .path.path }}/values.yaml
        - repoURL: https://github.com/hwittenborn/homelab.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
